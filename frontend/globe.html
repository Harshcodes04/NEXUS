<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS — Navigation EXecutive for Unified Satellite ops</title>
  <meta name="description" content="NEXUS: Real-time mission control for autonomous satellite constellation management. Live TLE import, collision risk heatmap, analytics dashboard, and maneuver command center.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500;600&family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- CesiumJS (3D Globe) -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <!-- D3 / GSAP / Split.js / Lucide / TopoJSON -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/split.js/1.6.5/split.min.js"></script>
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>

  <!-- Design System -->
  <link rel="stylesheet" href="css/main.css?v=3">
  <link rel="stylesheet" href="css/panels.css?v=3">
  <link rel="stylesheet" href="css/animations.css?v=3">
  <link rel="stylesheet" href="css/command_center.css?v=1">
  <link rel="stylesheet" href="css/analytics.css?v=1">
</head>
<body>

  <!-- ── Cinematic background layers ── -->
  <!-- Disabled for Mission Control aesthetics -->

  <!-- ── Toast container ── -->
  <div id="toast-container"></div>


  <!-- ── Satellite detail drawer ── -->
  <div id="drawer-overlay"></div>
  <div id="sat-drawer">
    <div class="drawer-header">
      <span class="drawer-title">
        <i data-lucide="satellite"></i>
        Satellite Detail
      </span>
      <button id="drawer-close" class="drawer-close-btn">
        <i data-lucide="x"></i>
      </button>
    </div>
    <div id="drawer-body"></div>
  </div>

  <!-- ══════════════════════════════════════════ APP ══════════════════════════════════════════ -->
  <div id="app">

    <!-- TOP BAR -->
    <header id="topbar">
      <div class="topbar-left">
        <div class="topbar-logo">NEXUS</div>
      </div>
      <span class="sim-clock typing-cursor" id="sim-clock">SIM 2026-03-12 08:00:00Z</span>

      <div class="topbar-right">
        <div class="view-toggle-group">
          <a href="/" class="view-toggle-btn" style="text-decoration: none;">
            <i data-lucide="globe"></i>
            <span>Projection</span>
          </a>
          <a href="/?mode=charts" class="view-toggle-btn" style="text-decoration: none;">
            <i data-lucide="bar-chart-2"></i>
            <span>Charts</span>
          </a>
          <a href="/?mode=analytics" class="view-toggle-btn" style="text-decoration: none;">
            <i data-lucide="database"></i>
            <span>Analytics</span>
          </a>
          <a href="/globe.html" class="view-toggle-btn active" style="text-decoration: none;">
            <i data-lucide="box"></i>
            <span>3D Globe</span>
          </a>
        </div>
        <!-- Command Center Launch Button -->
        <button id="cmd-open-btn" title="Open Maneuver Command Center">
          <i data-lucide="send"></i>
          COMMAND
        </button>
      </div>
    </header>

    <!-- SPEED CONTROL BAR -->
    <div id="speed-bar"></div>

    <!-- MAIN CONTENT -->
    <main id="main-content">

      <!-- PROJECTION MODE VIEW - Full Page Map -->
      <div id="projection-view" class="view-container active">
        <div id="map-panel" class="panel glass-panel full-page-map">
          <div class="panel-content">
            <div id="cesium-container" style="display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0;"></div>
            <div id="groundtrack-svg-container" style="display:none;position:relative;width:100%;height:100%;">
              <canvas id="debris-canvas" style="position:absolute;top:0;left:0;pointer-events:none;z-index:1;"></canvas>
              <svg id="groundtrack-svg" style="position:absolute;top:0;left:0;z-index:2;"></svg>
            </div>
          </div>
          <div class="globe-tooltip" id="globe-tooltip">
            <div class="sat-id"></div>
            <div class="sat-field"><span class="label">STATUS</span><span class="value"></span></div>
            <div class="sat-field"><span class="label">FUEL</span><span class="value"></span></div>
            <div class="sat-field"><span class="label">LAST BURN</span><span class="value"></span></div>
          </div>
        </div>
      </div><!-- /projection-view -->

    </main><!-- /main-content -->

  </div><!-- /app -->

  <!-- Context Menu -->
  <div id="context-menu">
    <div class="context-menu-item" data-action="schedule-maneuver">
      <i data-lucide="rocket"></i> Schedule Maneuver
    </div>
    <div class="context-menu-item" data-action="view-telemetry">
      <i data-lucide="radio"></i> View Telemetry
    </div>
    <div class="context-menu-item" data-action="open-drawer">
      <i data-lucide="info"></i> Satellite Details
    </div>
    <div class="context-menu-item" data-action="track-camera">
      <i data-lucide="video"></i> Track Camera
    </div>
  </div>

  <!-- JS modules — order matters for globals -->
  <script src="js/state.js?v=5"></script>
  <script src="js/api.js?v=5"></script>
  <script src="js/ws_telemetry.js?v=5"></script>
  <script src="js/globe.js?v=5"></script>
  <script src="js/alerts.js?v=5"></script>
  <script src="js/speedControl.js?v=5"></script>
  <script src="js/drawer.js?v=5"></script>
  <script src="js/viewMode.js?v=5"></script>
  <script src="js/resize.js?v=1"></script>
  <script src="js/main.js?v=5"></script>
</body>
</html>
